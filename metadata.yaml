name: astrbot_plugin_ayabot_stats
display_name: Ayabot 礼物统计查询
short_desc: 查询自己在 Ayabot B站直播间中的礼物投喂、盲盒数量与盈亏统计
desc: |
  配合 Ayabot 直播间机器人使用的 QQ 群查询插件。
  群成员可绑定自己的 B站 UID，然后通过指令查询本日/本周/本月/全部记录的礼物投喂情况、盲盒数量和盈亏。
author: Ayabot
version: "1.0.0"
repo: https://github.com/yujianke100/astrbot_plugin_ayabot_stats
support_platforms:
  - aiocqhttp
  - qq_official
astrbot_version: ">=4.16"
